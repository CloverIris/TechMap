          $ref: '#/components/schemas/OverlayType'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/MapNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/MapEdge'
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/OverlayAnnotation'

    LayoutOverlayResponse:
      type: object
      additionalProperties: false
      required: [meta, overlay]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        overlay:
          $ref: '#/components/schemas/LayoutOverlay'

    LayoutExpansion:
      type: object
      additionalProperties: false
      required:
        - baseSnapshotId
        - targetEntityId
        - expandedNodes
        - expandedEdges
        - regionOverrides
