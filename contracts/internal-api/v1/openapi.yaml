      additionalProperties: false
      required: [meta, source]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        source:
          $ref: '#/components/schemas/SourceView'

    SlugResolution:
      type: object
      additionalProperties: false
      required:
        - status
        - requestedKind
        - requestedSlug
        - entityId
        - canonicalKind
        - canonicalSlug
        - canonicalPath
        - redirectRequired
        - replacementEntityId
      properties:
        status:
          type: string
          enum: [canonical, redirected, merged, tombstoned]
        requestedKind:
          $ref: '#/components/schemas/ResourceKind'
        requestedSlug:
          $ref: '#/components/schemas/Slug'
        entityId:
          oneOf:
            - $ref: '#/components/schemas/EntityId'
            - type: 'null'
        canonicalKind:
          oneOf:
            - $ref: '#/components/schemas/ResourceKind'
            - type: 'null'
        canonicalSlug:
          type: [string, 'null']
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        canonicalPath:
          type: [string, 'null']
          pattern: '^/(zh|en)/(tech|domain|org|person|paper)/[a-z0-9]+(?:-[a-z0-9]+)*$'
        redirectRequired:
          type: boolean
        replacementEntityId:
          oneOf:
            - $ref: '#/components/schemas/EntityId'
            - type: 'null'

    SlugResolutionResponse:
      type: object
      additionalProperties: false
      required: [meta, resolution]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        resolution:
          $ref: '#/components/schemas/SlugResolution'

