            - type: 'null'
        updatedAt:
          oneOf:
            - $ref: '#/components/schemas/TemporalValue'
            - type: 'null'
        accessedAt:
          type: string
          format: date
        license:
          type: [string, 'null']
          maxLength: 160
        contentHash:
          oneOf:
            - $ref: '#/components/schemas/ContentHash'
