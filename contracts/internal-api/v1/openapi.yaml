        classifications:
          type: array
          items:
            $ref: '#/components/schemas/EntityReference'
        lifecycle:
          $ref: '#/components/schemas/LifecycleInfo'
        review:
          $ref: '#/components/schemas/ReviewInfo'
        relations:
          type: array
          items:
            $ref: '#/components/schemas/RelationView'
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventView'
        eraVersions:
          type: array
          items:
            $ref: '#/components/schemas/EntityReference'
        statements:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/StatementView'
        sources:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SourceView'
        links:
          type: array
          items:
            $ref: '#/components/schemas/ExternalLink'
