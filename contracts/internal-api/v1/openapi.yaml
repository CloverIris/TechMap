          minItems: 3
          items:
            $ref: '#/components/schemas/GuidedPathSummary'

    GuidedPathResponse:
      type: object
      additionalProperties: false
      required: [meta, path]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        path:
          $ref: '#/components/schemas/GuidedPath'

    TelemetryEventType:
      type: string
      enum:
        - map_interactive
        - view_changed
        - search_completed
        - entity_focused
        - relation_expanded
        - era_expanded
        - source_opened
        - guided_path_started
        - guided_path_advanced
        - guided_path_completed
        - render_error

