    LayoutExpansionResponse:
      type: object
      additionalProperties: false
      required: [meta, expansion]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        expansion:
          $ref: '#/components/schemas/LayoutExpansion'

    LayoutNeighborhood:
      type: object
      additionalProperties: false
      required: [baseSnapshotId, focusEntityId, nodes, edges, totalAvailable, truncated]
