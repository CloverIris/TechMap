      type: string
      enum: [webgpu, webgl2, basic]

    DeviceClass:
      type: string
      enum: [desktop, tablet, mobile]

    DurationBucket:
      type: string
      enum: [under_1s, 1_to_3s, 3_to_6s, 6_to_10s, over_10s, not_applicable]

    CountBucket:
      type: string
      enum: [zero, one, two_to_five, six_to_twenty, over_twenty, not_applicable]

    TelemetryEvent:
      type: object
      additionalProperties: false
      required:
        - eventType
        - occurredAt
        - contractVersion
        - dataVersion
        - layoutVersion
        - locale
        - renderBackend
        - deviceClass
        - view
        - entityType
        - rootDomainId
        - guidedPathId
        - durationBucket
        - countBucket
        - errorKind
      properties:
        eventType:
          $ref: '#/components/schemas/TelemetryEventType'
        occurredAt:
          type: string
          format: date-time
        contractVersion:
          type: string
          const: 1.0.0
        dataVersion:
          $ref: '#/components/schemas/SemanticVersion'
        layoutVersion:
          type: [string, 'null']
          pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'
        locale:
          $ref: '#/components/schemas/Locale'
        renderBackend:
          $ref: '#/components/schemas/RenderBackend'
        deviceClass:
          $ref: '#/components/schemas/DeviceClass'
        view:
          oneOf:
            - $ref: '#/components/schemas/MapView'
            - type: 'null'
        entityType:
          oneOf:
            - $ref: '#/components/schemas/EntityType'
            - type: 'null'
        rootDomainId:
          oneOf:
            - $ref: '#/components/schemas/RootDomainId'
            - type: 'null'
        guidedPathId:
          oneOf:
            - $ref: '#/components/schemas/GuidedPathId'
            - type: 'null'
        durationBucket:
          $ref: '#/components/schemas/DurationBucket'
        countBucket:
          $ref: '#/components/schemas/CountBucket'
        errorKind:
          type: [string, 'null']
          enum:
            - null
            - renderer_initialization
            - asset_load
            - context_lost
            - api_unavailable
            - unknown

    TelemetryBatch:
      type: object
      additionalProperties: false
      required: [events]
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/TelemetryEvent'

    InvalidParameter:
      type: object
      additionalProperties: false
      required: [name, location, reason]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        location:
          type: string
          enum: [path, query, header, body]
        reason:
          type: string
          minLength: 1
          maxLength: 300

    ProblemDetails:
      type: object
      additionalProperties: false
      required: [type, title, status, code, requestId, detail, invalidParameters]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 1
          maxLength: 120
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          enum:
            - invalid_request
            - invalid_parameter
            - locale_not_supported
            - resource_not_found
            - release_not_found
            - release_gone
            - layout_not_found
            - expansion_not_supported
            - payload_too_large
            - rate_limited
            - internal_error
            - service_unavailable
        requestId:
          type: string
          minLength: 8
          maxLength: 80
        detail:
          type: string
          minLength: 1
          maxLength: 500
        invalidParameters:
          type: array
          items:
            $ref: '#/components/schemas/InvalidParameter'

