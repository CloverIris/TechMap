          $ref: '#/components/schemas/Bounds3'
        canonicalCamera:
          $ref: '#/components/schemas/CanonicalCamera'
        cameraConstraints:
          $ref: '#/components/schemas/CameraConstraints'
        strata:
          type: array
          items:
            $ref: '#/components/schemas/LayoutStratum'
        lodBands:
          type: array
