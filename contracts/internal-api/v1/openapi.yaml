        displayLabel:
          type: string
          minLength: 1
          maxLength: 80
        lifecycleStatus:
          $ref: '#/components/schemas/LifecycleStatus'
        statementIds:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/StatementId'

    LayoutOverlay:
      type: object
      additionalProperties: false
      required: [baseSnapshotId, overlay, nodes, edges, annotations]
