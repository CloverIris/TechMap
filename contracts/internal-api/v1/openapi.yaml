    SearchRequest:
      type: object
      additionalProperties: false
      required: [query, locale, entityTypes, rootDomainIds, limit, cursor]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 120
        locale:
          $ref: '#/components/schemas/Locale'
        entityTypes:
          type: array
          maxItems: 21
          uniqueItems: true
          items:
            $ref: '#/components/schemas/EntityType'
        rootDomainIds:
          type: array
          maxItems: 12
          uniqueItems: true
          items:
            $ref: '#/components/schemas/RootDomainId'
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        cursor:
          type: [string, 'null']
          maxLength: 512

    SearchMatch:
      type: object
      additionalProperties: false
      required: [kind, field, highlightRanges]
      properties:
        kind:
          type: string
          enum: [exact, canonical, alias, abbreviation, pinyin, prefix, substring, trigram]
        field:
          type: string
          enum: [canonicalName, displayName, alias, abbreviation, pinyin, summary]
        highlightRanges:
          type: array
          maxItems: 8
          items:
            type: object
            additionalProperties: false
            required: [start, end]
            properties:
              start:
                type: integer
                minimum: 0
              end:
                type: integer
                minimum: 1

    SearchResult:
      type: object
      additionalProperties: false
      required: [entity, match]
      properties:
        entity:
          $ref: '#/components/schemas/EntityMapSummary'
        match:
          $ref: '#/components/schemas/SearchMatch'

    SearchResponse:
      type: object
      additionalProperties: false
      required: [meta, items, nextCursor, totalIsExact]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        items:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/SearchResult'
        nextCursor:
          type: [string, 'null']
          maxLength: 512
        totalIsExact:
          type: boolean
          description: False when the backend intentionally avoids an expensive exact count.

    ValidityWindow:
      type: object
      additionalProperties: false
      required: [validFrom, validTo, sourceVersion, targetVersion]
