          type: array
          minItems: 12
          items:
            $ref: '#/components/schemas/LayoutRegion'
        nodes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MapNode'
        landmarkEdges:
          type: array
          items:
            $ref: '#/components/schemas/MapEdge'

    LayoutSnapshotResponse:
