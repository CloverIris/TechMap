          pattern: '^layout\.[a-z0-9][a-z0-9.-]*$'
        focusEntityId:
          $ref: '#/components/schemas/EntityId'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/MapNode'
        edges:
          type: array
          maxItems: 80
          items:
